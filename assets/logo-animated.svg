<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <filter id="glow-logo">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="pulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.3">
        <animate attributeName="stop-opacity" values="0.1;0.4;0.1" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0">
        <animate attributeName="stop-opacity" values="0;0.15;0" dur="3s" repeatCount="indefinite"/>
      </stop>
    </radialGradient>
  </defs>

  <!-- Pulsing background glow -->
  <circle cx="150" cy="150" r="140" fill="url(#pulse)">
    <animate attributeName="r" values="120;145;120" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Outer shield ring -->
  <circle cx="150" cy="150" r="110" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.3">
    <animate attributeName="r" values="108;115;108" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Inner shield ring -->
  <circle cx="150" cy="150" r="90" fill="none" stroke="#58a6ff" stroke-width="1.5" opacity="0.2">
    <animate attributeName="r" values="88;93;88" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.35;0.15" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Tardigrade body (simplified) -->
  <g filter="glow-logo" transform="translate(150,150)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="45" ry="35" fill="#0d1117" stroke="#00ff88" stroke-width="2">
      <animate attributeName="ry" values="34;37;34" dur="2.5s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Head -->
    <ellipse cx="-50" cy="-5" rx="20" ry="18" fill="#0d1117" stroke="#00ff88" stroke-width="2">
      <animate attributeName="rx" values="19;21;19" dur="2.5s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Eyes -->
    <circle cx="-58" cy="-10" r="3" fill="#00ff88">
      <animate attributeName="r" values="2.5;3.5;2.5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-48" cy="-10" r="3" fill="#00ff88">
      <animate attributeName="r" values="2.5;3.5;2.5" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- Legs (4 pairs) -->
    <!-- Front left -->
    <line x1="-30" y1="-30" x2="-40" y2="-55" stroke="#58a6ff" stroke-width="2" stroke-linecap="round">
      <animate attributeName="y2" values="-53;-58;-53" dur="1.5s" repeatCount="indefinite"/>
    </line>
    <!-- Front right -->
    <line x1="-30" y1="30" x2="-40" y2="55" stroke="#58a6ff" stroke-width="2" stroke-linecap="round">
      <animate attributeName="y2" values="53;58;53" dur="1.5s" begin="0.2s" repeatCount="indefinite"/>
    </line>
    <!-- Mid-front left -->
    <line x1="-10" y1="-32" x2="-10" y2="-57" stroke="#58a6ff" stroke-width="2" stroke-linecap="round">
      <animate attributeName="y2" values="-55;-60;-55" dur="1.5s" begin="0.4s" repeatCount="indefinite"/>
    </line>
    <!-- Mid-front right -->
    <line x1="-10" y1="32" x2="-10" y2="57" stroke="#58a6ff" stroke-width="2" stroke-linecap="round">
      <animate attributeName="y2" values="55;60;55" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
    </line>
    <!-- Mid-back left -->
    <line x1="15" y1="-32" x2="20" y2="-57" stroke="#58a6ff" stroke-width="2" stroke-linecap="round">
      <animate attributeName="y2" values="-55;-60;-55" dur="1.5s" begin="0.8s" repeatCount="indefinite"/>
    </line>
    <!-- Mid-back right -->
    <line x1="15" y1="32" x2="20" y2="57" stroke="#58a6ff" stroke-width="2" stroke-linecap="round">
      <animate attributeName="y2" values="55;60;55" dur="1.5s" begin="1.0s" repeatCount="indefinite"/>
    </line>
    <!-- Back left -->
    <line x1="38" y1="-28" x2="50" y2="-50" stroke="#58a6ff" stroke-width="2" stroke-linecap="round">
      <animate attributeName="y2" values="-48;-54;-48" dur="1.5s" begin="1.2s" repeatCount="indefinite"/>
    </line>
    <!-- Back right -->
    <line x1="38" y1="28" x2="50" y2="50" stroke="#58a6ff" stroke-width="2" stroke-linecap="round">
      <animate attributeName="y2" values="48;54;48" dur="1.5s" begin="1.4s" repeatCount="indefinite"/>
    </line>

    <!-- Claws (small circles at leg ends) -->
    <circle cx="-40" cy="-55" r="3" fill="#bc8cff">
      <animate attributeName="cy" values="-53;-58;-53" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-40" cy="55" r="3" fill="#bc8cff">
      <animate attributeName="cy" values="53;58;53" dur="1.5s" begin="0.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-10" cy="-57" r="3" fill="#bc8cff">
      <animate attributeName="cy" values="-55;-60;-55" dur="1.5s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-10" cy="57" r="3" fill="#bc8cff">
      <animate attributeName="cy" values="55;60;55" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="-57" r="3" fill="#bc8cff">
      <animate attributeName="cy" values="-55;-60;-55" dur="1.5s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="57" r="3" fill="#bc8cff">
      <animate attributeName="cy" values="55;60;55" dur="1.5s" begin="1.0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="-50" r="3" fill="#bc8cff">
      <animate attributeName="cy" values="-48;-54;-48" dur="1.5s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="50" r="3" fill="#bc8cff">
      <animate attributeName="cy" values="48;54;48" dur="1.5s" begin="1.4s" repeatCount="indefinite"/>
    </circle>

    <!-- Verification shield icon on body -->
    <path d="M -5,-12 L 5,-12 L 7,-2 L 0,8 L -7,-2 Z" fill="none" stroke="#00ff88" stroke-width="1.5">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </path>
    <polyline points="-3,-2 -1,2 4,-5" fill="none" stroke="#00ff88" stroke-width="1.5" stroke-linecap="round">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </polyline>
  </g>

  <!-- Text -->
  <text x="150" y="275" text-anchor="middle" fill="#e6edf3" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" letter-spacing="3">TARDYGRADA</text>
  <text x="150" y="293" text-anchor="middle" fill="#8b949e" font-family="system-ui,sans-serif" font-size="10">catch lazy agents, contradictions, and tampering</text>
</svg>
