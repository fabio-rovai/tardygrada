<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="glow-green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#00cc66;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="glow-blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#1f6feb;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="glow-red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#da3633;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="glow-purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#bc8cff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.4"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#e6edf3" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="600">How Tardygrada verifies claims</text>

  <!-- Isometric grid lines (subtle) -->
  <g opacity="0.05" stroke="#58a6ff" stroke-width="0.5">
    <line x1="50" y1="450" x2="850" y2="450"/>
    <line x1="50" y1="400" x2="850" y2="400"/>
    <line x1="50" y1="350" x2="850" y2="350"/>
  </g>

  <!-- LAYER 1: Claim Input -->
  <g filter="shadow">
    <rect x="30" y="60" width="120" height="55" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
    <text x="90" y="82" text-anchor="middle" fill="#e6edf3" font-family="monospace" font-size="11" font-weight="600">CLAIM</text>
    <text x="90" y="100" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">"Paris is in</text>
    <text x="90" y="112" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">France"</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="150" y1="87" x2="175" y2="87" stroke="url(#glow-blue)" stroke-width="2">
    <animate attributeName="stroke-dashoffset" from="20" to="0" dur="1s" repeatCount="indefinite"/>
  </line>
  <polygon points="175,82 185,87 175,92" fill="#58a6ff" opacity="0.8">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1s" repeatCount="indefinite"/>
  </polygon>

  <!-- LAYER 2: Decompose -->
  <g filter="shadow">
    <rect x="185" y="55" width="100" height="65" rx="8" fill="#0d2137" stroke="#1f6feb" stroke-width="1.5"/>
    <text x="235" y="77" text-anchor="middle" fill="#58a6ff" font-family="monospace" font-size="10" font-weight="600">DECOMPOSE</text>
    <text x="235" y="93" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="8">60+ patterns</text>
    <text x="235" y="107" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="8">→ RDF triples</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="285" y1="87" x2="310" y2="87" stroke="url(#glow-blue)" stroke-width="2" stroke-dasharray="4,4">
    <animate attributeName="stroke-dashoffset" from="20" to="0" dur="1s" repeatCount="indefinite"/>
  </line>
  <polygon points="310,82 320,87 310,92" fill="#58a6ff" opacity="0.8">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.2s" repeatCount="indefinite"/>
  </polygon>

  <!-- LAYER 3: Ground -->
  <g filter="shadow">
    <rect x="320" y="55" width="100" height="65" rx="8" fill="#0d2137" stroke="#1f6feb" stroke-width="1.5"/>
    <text x="370" y="77" text-anchor="middle" fill="#58a6ff" font-family="monospace" font-size="10" font-weight="600">GROUND</text>
    <text x="370" y="93" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="8">Datalog KB</text>
    <text x="370" y="107" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="8">15 rules</text>
  </g>

  <!-- Arrow 3 -->
  <line x1="420" y1="87" x2="445" y2="87" stroke="url(#glow-blue)" stroke-width="2" stroke-dasharray="4,4">
    <animate attributeName="stroke-dashoffset" from="20" to="0" dur="1s" repeatCount="indefinite"/>
  </line>
  <polygon points="445,82 455,87 445,92" fill="#58a6ff" opacity="0.8">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.4s" repeatCount="indefinite"/>
  </polygon>

  <!-- LAYER 4: Consistency -->
  <g filter="shadow">
    <rect x="455" y="55" width="100" height="65" rx="8" fill="#0d2137" stroke="#1f6feb" stroke-width="1.5"/>
    <text x="505" y="77" text-anchor="middle" fill="#58a6ff" font-family="monospace" font-size="10" font-weight="600">CONSISTENCY</text>
    <text x="505" y="93" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="8">OWL reasoner</text>
    <text x="505" y="107" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="8">contradictions?</text>
  </g>

  <!-- Arrow 4 -->
  <line x1="555" y1="87" x2="580" y2="87" stroke="url(#glow-blue)" stroke-width="2" stroke-dasharray="4,4">
    <animate attributeName="stroke-dashoffset" from="20" to="0" dur="1s" repeatCount="indefinite"/>
  </line>
  <polygon points="580,82 590,87 580,92" fill="#58a6ff" opacity="0.8">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.6s" repeatCount="indefinite"/>
  </polygon>

  <!-- LAYER 5: Numeric + Work Verify -->
  <g filter="shadow">
    <rect x="590" y="55" width="100" height="65" rx="8" fill="#0d2137" stroke="#1f6feb" stroke-width="1.5"/>
    <text x="640" y="77" text-anchor="middle" fill="#58a6ff" font-family="monospace" font-size="10" font-weight="600">NUMERIC</text>
    <text x="640" y="93" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="8">9 checkers</text>
    <text x="640" y="107" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="8">+ work verify</text>
  </g>

  <!-- Arrow 5 -->
  <line x1="690" y1="87" x2="715" y2="87" stroke="url(#glow-green)" stroke-width="2" stroke-dasharray="4,4">
    <animate attributeName="stroke-dashoffset" from="20" to="0" dur="1s" repeatCount="indefinite"/>
  </line>
  <polygon points="715,82 725,87 715,92" fill="#00ff88" opacity="0.8">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" repeatCount="indefinite"/>
  </polygon>

  <!-- RESULT: Verified -->
  <g filter="glow">
    <rect x="725" y="55" width="140" height="65" rx="8" fill="#0b3d1a" stroke="#00ff88" stroke-width="2"/>
    <text x="795" y="80" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="13" font-weight="700">VERIFIED</text>
    <text x="795" y="100" text-anchor="middle" fill="#7ee787" font-family="monospace" font-size="9">confidence: 85%</text>
    <text x="795" y="112" text-anchor="middle" fill="#7ee787" font-family="monospace" font-size="9">5 layers passed</text>
  </g>

  <!-- === LAZINESS DETECTION SECTION === -->
  <text x="90" y="165" text-anchor="middle" fill="#bc8cff" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Laziness Detection</text>

  <!-- Agent box -->
  <g filter="shadow">
    <rect x="30" y="180" width="120" height="50" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
    <text x="90" y="200" text-anchor="middle" fill="#e6edf3" font-family="monospace" font-size="10" font-weight="600">Agent claims:</text>
    <text x="90" y="215" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">"queried 5 sources"</text>
  </g>

  <!-- VM Dashcam -->
  <g filter="shadow">
    <rect x="185" y="175" width="180" height="60" rx="8" fill="#1a0d2e" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="275" y="197" text-anchor="middle" fill="#bc8cff" font-family="monospace" font-size="10" font-weight="700">VM DASHCAM</text>
    <text x="275" y="213" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">observed: 0 queries, 0 reads</text>
    <text x="275" y="225" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">hash: a7f3...2d1b</text>
  </g>

  <!-- Arrow -->
  <line x1="150" y1="205" x2="185" y2="205" stroke="url(#glow-purple)" stroke-width="2"/>

  <!-- Verdict -->
  <g filter="glow">
    <rect x="400" y="180" width="140" height="50" rx="8" fill="#3d0b0b" stroke="#ff6b6b" stroke-width="2"/>
    <text x="470" y="202" text-anchor="middle" fill="#ff6b6b" font-family="monospace" font-size="12" font-weight="700">FAKE PROOF</text>
    <text x="470" y="218" text-anchor="middle" fill="#f97583" font-family="monospace" font-size="9">hash mismatch detected</text>
  </g>
  <line x1="365" y1="205" x2="400" y2="205" stroke="url(#glow-red)" stroke-width="2"/>

  <!-- === TAMPER PROTECTION SECTION === -->
  <text x="90" y="275" text-anchor="middle" fill="#00ff88" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Tamper Protection</text>

  <!-- 5 tiers as isometric blocks -->
  <g transform="translate(30, 290)">
    <!-- Mutable -->
    <g>
      <rect x="0" y="20" width="80" height="40" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
      <text x="40" y="38" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="8">mutable</text>
      <text x="40" y="52" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="7">no protection</text>
    </g>
    <!-- Default -->
    <g>
      <rect x="100" y="15" width="80" height="45" rx="4" fill="#0d2137" stroke="#1f6feb" stroke-width="1"/>
      <text x="140" y="33" text-anchor="middle" fill="#58a6ff" font-family="monospace" font-size="8">let</text>
      <text x="140" y="47" text-anchor="middle" fill="#388bfd" font-family="monospace" font-size="7">OS-locked</text>
      <text x="140" y="57" text-anchor="middle" fill="#388bfd" font-family="monospace" font-size="7">mprotect</text>
    </g>
    <!-- Verified -->
    <g>
      <rect x="200" y="10" width="80" height="50" rx="4" fill="#0d2137" stroke="#1f6feb" stroke-width="1.5"/>
      <text x="240" y="28" text-anchor="middle" fill="#58a6ff" font-family="monospace" font-size="8">@verified</text>
      <text x="240" y="42" text-anchor="middle" fill="#388bfd" font-family="monospace" font-size="7">+ SHA-256</text>
      <text x="240" y="52" text-anchor="middle" fill="#388bfd" font-family="monospace" font-size="7">197ns/read</text>
    </g>
    <!-- Hardened -->
    <g>
      <rect x="300" y="5" width="80" height="55" rx="4" fill="#1a0d2e" stroke="#8b5cf6" stroke-width="1.5"/>
      <text x="340" y="23" text-anchor="middle" fill="#bc8cff" font-family="monospace" font-size="8">@hardened</text>
      <text x="340" y="37" text-anchor="middle" fill="#a371f7" font-family="monospace" font-size="7">+ replicas</text>
      <text x="340" y="47" text-anchor="middle" fill="#a371f7" font-family="monospace" font-size="7">majority vote</text>
      <text x="340" y="57" text-anchor="middle" fill="#a371f7" font-family="monospace" font-size="7">~500ns/read</text>
    </g>
    <!-- Sovereign -->
    <g filter="glow">
      <rect x="400" y="0" width="90" height="60" rx="4" fill="#0b3d1a" stroke="#00ff88" stroke-width="2"/>
      <text x="445" y="18" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="8" font-weight="700">@sovereign</text>
      <text x="445" y="32" text-anchor="middle" fill="#7ee787" font-family="monospace" font-size="7">+ ed25519</text>
      <text x="445" y="42" text-anchor="middle" fill="#7ee787" font-family="monospace" font-size="7">+ BFT consensus</text>
      <text x="445" y="52" text-anchor="middle" fill="#7ee787" font-family="monospace" font-size="7">1,538ns/read</text>
    </g>

    <!-- Rising line connecting tiers -->
    <line x1="80" y1="40" x2="100" y2="37" stroke="#30363d" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="180" y1="37" x2="200" y2="35" stroke="#1f6feb" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="280" y1="35" x2="300" y2="32" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="380" y1="32" x2="400" y2="30" stroke="#00ff88" stroke-width="1" stroke-dasharray="3,3"/>
  </g>

  <!-- === CONTRADICTION DETECTION SECTION === -->
  <text x="640" y="165" text-anchor="middle" fill="#ff6b6b" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Contradiction Detection</text>

  <!-- Claim A -->
  <g filter="shadow">
    <rect x="560" y="180" width="160" height="35" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="640" y="200" text-anchor="middle" fill="#e6edf3" font-family="monospace" font-size="8">"Completed on time"</text>
  </g>

  <!-- Claim B -->
  <g filter="shadow">
    <rect x="560" y="225" width="160" height="35" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="640" y="245" text-anchor="middle" fill="#e6edf3" font-family="monospace" font-size="8">"Delayed by 3 months"</text>
  </g>

  <!-- Individual check -->
  <g>
    <rect x="740" y="180" width="50" height="35" rx="4" fill="#0b3d1a" stroke="#00ff88" stroke-width="1"/>
    <text x="765" y="202" text-anchor="middle" fill="#7ee787" font-family="monospace" font-size="9">PASS</text>
  </g>
  <g>
    <rect x="740" y="225" width="50" height="35" rx="4" fill="#0b3d1a" stroke="#00ff88" stroke-width="1"/>
    <text x="765" y="247" text-anchor="middle" fill="#7ee787" font-family="monospace" font-size="9">PASS</text>
  </g>
  <line x1="720" y1="197" x2="740" y2="197" stroke="#30363d" stroke-width="1"/>
  <line x1="720" y1="242" x2="740" y2="242" stroke="#30363d" stroke-width="1"/>

  <text x="765" y="275" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="7">individually fine</text>

  <!-- Together arrow -->
  <line x1="640" y1="260" x2="640" y2="290" stroke="url(#glow-red)" stroke-width="2"/>
  <polygon points="635,290 640,300 645,290" fill="#ff6b6b"/>

  <!-- Conflict result -->
  <g filter="glow">
    <rect x="570" y="300" width="140" height="50" rx="8" fill="#3d0b0b" stroke="#ff6b6b" stroke-width="2"/>
    <text x="640" y="322" text-anchor="middle" fill="#ff6b6b" font-family="monospace" font-size="12" font-weight="700">CONFLICT</text>
    <text x="640" y="340" text-anchor="middle" fill="#f97583" font-family="monospace" font-size="8">temporal contradiction</text>
  </g>
  <text x="640" y="365" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="7">caught by checking together</text>

  <!-- === STATS BAR === -->
  <g>
    <rect x="30" y="400" width="840" height="80" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1"/>

    <text x="120" y="425" text-anchor="middle" fill="#e6edf3" font-family="monospace" font-size="20" font-weight="700">95%</text>
    <text x="120" y="445" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">contradictions</text>
    <text x="120" y="460" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">caught</text>

    <line x1="225" y1="410" x2="225" y2="470" stroke="#21262d" stroke-width="1"/>

    <text x="330" y="425" text-anchor="middle" fill="#e6edf3" font-family="monospace" font-size="20" font-weight="700">F1: 1.00</text>
    <text x="330" y="445" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">laziness</text>
    <text x="330" y="460" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">detection</text>

    <line x1="435" y1="410" x2="435" y2="470" stroke="#21262d" stroke-width="1"/>

    <text x="540" y="425" text-anchor="middle" fill="#e6edf3" font-family="monospace" font-size="20" font-weight="700">12ms</text>
    <text x="540" y="445" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">per document</text>
    <text x="540" y="460" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">no LLM needed</text>

    <line x1="645" y1="410" x2="645" y2="470" stroke="#21262d" stroke-width="1"/>

    <text x="750" y="425" text-anchor="middle" fill="#e6edf3" font-family="monospace" font-size="20" font-weight="700">5,000</text>
    <text x="750" y="445" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">agents in</text>
    <text x="750" y="460" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">97ms</text>
  </g>
</svg>
